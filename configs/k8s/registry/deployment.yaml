---
apiVersion: v1
kind: Namespace
metadata:
  name: registry-system

---
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: registry-secret
  namespace: registry-system
data:
  tls.crt: ''
  tls.key: ''

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data-pvc
  namespace: registry-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 32Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: '/certs/tls.crt'
            - name: REGISTRY_HTTP_TLS_KEY
              value: '/certs/tls.key'
          volumeMounts:
            - name: registry-certs
              mountPath: '/certs'
              readOnly: true
            - name: registry-data
              mountPath: '/var/lib/registry'
              subPath: registry
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: registry-certs
          secret:
            secretName: registry-secret
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: registry-system
spec:
  type: LoadBalancer
  selector:
    app: registry
  ports:
    - name: registry-port
      protocol: TCP
      port: 5000
      targetPort: 5000
  loadBalancerIP: 192.168.2.199
